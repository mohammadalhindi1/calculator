<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="calculator-header">
                <h1>Calculator</h1>
                <p class="subtitle">Simple & Elegant</p>
            </div>
            <input type="text" id="display" class="display" placeholder="0" readonly>
            <div class="buttons">
                <button class="btn clear-btn" onclick="clearDisplay()" title="Clear all">C</button>
                <button class="btn operator-btn" onclick="appendOperator('/')" title="Divide">/</button>
                <button class="btn operator-btn" onclick="appendOperator('*')" title="Multiply">×</button>
                <button class="btn delete-btn" onclick="deleteLast()" title="Delete last digit">DEL</button>

                <button class="btn number-btn" onclick="appendNumber('7')">7</button>
                <button class="btn number-btn" onclick="appendNumber('8')">8</button>
                <button class="btn number-btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator-btn" onclick="appendOperator('-')" title="Subtract">−</button>

                <button class="btn number-btn" onclick="appendNumber('4')">4</button>
                <button class="btn number-btn" onclick="appendNumber('5')">5</button>
                <button class="btn number-btn" onclick="appendNumber('6')">6</button>
                <button class="btn operator-btn" onclick="appendOperator('+')" title="Add">+</button>

                <button class="btn number-btn" onclick="appendNumber('1')">1</button>
                <button class="btn number-btn" onclick="appendNumber('2')">2</button>
                <button class="btn number-btn" onclick="appendNumber('3')">3</button>
                <button class="btn decimal-btn" onclick="appendNumber('.')" title="Decimal point">.</button>

                <button class="btn zero-btn" onclick="appendNumber('0')">0</button>
                <button class="btn equal-btn" onclick="calculate()">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
